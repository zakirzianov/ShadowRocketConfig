# @tatarinovms
[General]
# URL для автоматического обновления конфигурации
update-url = https://raw.githubusercontent.com/zakirzianov/ShadowRocketConfig/master/freedom.conf
# Обход системного прокси для локальных подключений
bypass-system = true
# Отключение IPv6 для избежания проблем с совместимостью
ipv6 = false
# Предпочтение IPv4 над IPv6
prefer-ipv6 = false
# Ответ на запросы приватных IP адресов
private-ip-answer = true
# Отключение прямого системного DNS
dns-direct-system = false
# Использование системного DNS как резервного
dns-fallback-system = true
# Основные DNS серверы
dns-server = https://dns.comss.one/dns-query, https://dns.adguard-dns.com/dns-query
# Резервный DNS сервер (системный)
fallback-dns-server = system
# Перехват DNS запросов на порт 53
hijack-dns = :53
# Исключения из прокси
skip-proxy = 192.168.0.0/16,localhost,*.local,captive.apple.com

[Rule]
RULE-SET,https://raw.githubusercontent.com/zakirzianov/ShadowRocketConfig/master/lists/ChatGPT.list,PROXY
RULE-SET,https://raw.githubusercontent.com/zakirzianov/ShadowRocketConfig/master/lists/Youtube.list,PROXY
RULE-SET,https://raw.githubusercontent.com/zakirzianov/ShadowRocketConfig/master/lists/Telegram.list,PROXY
# Все остальные подключения идут напрямую
FINAL,DIRECT
